name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-sql:
    name: Lint SQL Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sqlfluff
        run: pip install sqlfluff
      - name: Lint SQL
        run: sqlfluff lint sql/ --dialect mysql --exclude-rules LT12

  test-etl:
    name: Test ETL Pipeline
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0.46
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: ecom_staging
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --cov=etl/
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpass

  validate:
    name: Validate Schema
    needs: [lint-sql, test-etl]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Schema validation passed
        run: echo "All checks passed \u2713"